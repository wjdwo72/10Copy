<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10Copy - 최고 효율의 요금제</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5142f5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --success: #10b981;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 네비게이션 복제 (공통 컴포넌트화 필요하지만 일단 직접 삽입) */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-container {
            max-width: 1100px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .header p {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 600px;
            line-height: 1.6;
            margin: 0 auto;
        }

        .pricing-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        .pricing-card {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.3s, border-color 0.3s;
        }

        .pricing-card:hover {
            transform: translateY(-10px);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .pricing-card.premium {
            border: 2px solid var(--primary);
            box-shadow: 0 20px 40px -15px rgba(81, 66, 245, 0.3);
            transform: scale(1.05);
        }

        .pricing-card.premium:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 40px;
            background: var(--primary);
            color: white;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 800;
        }

        .plan-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .price {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 30px;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .price span {
            font-size: 1rem;
            color: #64748b;
            font-weight: 500;
        }

        .features {
            list-style: none;
            padding: 0;
            margin: 0 0 40px 0;
            flex: 1;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 1rem;
            color: #cbd5e1;
        }

        .feature-item svg {
            width: 20px;
            height: 20px;
            color: var(--success);
        }

        .btn-buy {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: #334155;
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-buy:hover {
            background: #475569;
        }

        .btn-buy.primary {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
        }

        .btn-buy.primary:hover {
            box-shadow: 0 10px 20px rgba(81, 66, 245, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <a href="/" class="nav-logo">10Copy 🚀</a>
            <div class="nav-menu">
                <a href="/" class="nav-link">🏠 홈으로 돌아가기</a>
            </div>
        </div>
    </nav>

    <div class="header">
        <h1>강력한 광고 성과를<br>지금 바로 시작하세요.</h1>
        <p>복잡한 기획 없이도 1% 이상의 CTR을 만드는 카피 라이팅 엔진, 10Copy와 함께 폭발적인 매출 성장을 경험하세요.</p>
    </div>

    <div class="pricing-container" style="grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));">
        <!-- 요금제 1: 무료 -->
        <div class="pricing-card">
            <div class="plan-name">무료 체험</div>
            <div class="price">₩0 <span>/시작</span></div>
            <ul class="features">
                <li class="feature-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    매일 1회 무료 생성
                </li>
            </ul>
            <button class="btn-buy" onclick="location.href='/'">현재 플랜</button>
        </div>

        <!-- 요금제 2: 스타터 -->
        <div class="pricing-card">
            <div class="plan-name">스타터 패키지</div>
            <div class="price">₩11,000</div>
            <ul class="features">
                <li class="feature-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    카피 생성 100회
                </li>
            </ul>
            <button class="btn-buy primary">구매하기</button>
        </div>

        <!-- 요금제 3: 프로 (추천) -->
        <div class="pricing-card premium">
            <div class="badge">가성비 최고</div>
            <div class="plan-name">비즈니스 프로</div>
            <div class="price">₩33,000</div>
            <ul class="features">
                <li class="feature-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    카피 생성 350회
                </li>
            </ul>
            <button class="btn-buy primary">구매하기</button>
        </div>

        <!-- 요금제 4: 엘리트 -->
        <div class="pricing-card">
            <div class="plan-name">엘리트 마스터</div>
            <div class="price">₩55,000</div>
            <ul class="features">
                <li class="feature-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    카피 생성 650회
                </li>
            </ul>
            <button class="btn-buy primary">구매하기</button>
        </div>
    </div>
</body>
</html>
